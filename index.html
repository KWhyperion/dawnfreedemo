<!doctype html>
<html lang="en">
<head>
    <meta charset="UTF-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <meta name="description"
          content="Dawn — pre-submission feedback on conference abstracts. An illustrative demo for conference organisers."/>
    <title>Dawn Free — pre-submission abstract feedback</title>

    <!-- Plausible analytics (tagged-events variant so named custom events work).
         The stub queues events fired before the script loads so none are lost;
         if the script is blocked/absent, window.plausible stays the stub and
         calls simply no-op. -->
    <script defer data-domain="dawnfree-demo.hyperionlive.com"
            src="https://plausible.io/js/script.tagged-events.js"></script>
    <script>
        window.plausible = window.plausible || function () { (window.plausible.q = window.plausible.q || []).push(arguments) }
    </script>
</head>
<body>
<div id="root"></div>
<script type="module" src="/src/main.jsx"></script>
</body>
</html>
